# Sony VPL-XW5000ES IR-to-ADCP Bridge Configuration
# Scancodes discovered from Sony RM-PJ28 remote via --discover mode

projector:
  host: "192.168.1.80"
  port: 53595
  password: ""
  timeout_connect: 5.0
  timeout_read: 3.0
  retries: 3
  retry_delay: 0.2

ir:
  device_name: "gpio_ir_recv"
  protocol: "sony"

mappings:
  # --- Power ---
  "0x540015":
    command: power_toggle
    repeat: false
    description: "Power On/Off"

  # --- Input ---
  "0x540057":
    command: input_toggle
    repeat: false
    description: "Input (toggles HDMI 1/2)"

  # --- Menu Navigation ---
  "0x540029":
    command: 'key "menu"'
    repeat: false
    description: "Menu"
  "0x540035":
    command: 'key "up"'
    repeat: true
    description: "Up"
  "0x540036":
    command: 'key "down"'
    repeat: true
    description: "Down"
  "0x540034":
    command: 'key "left"'
    repeat: true
    description: "Left"
  "0x540033":
    command: 'key "right"'
    repeat: true
    description: "Right"
  "0x54005a":
    command: 'key "enter"'
    repeat: false
    description: "Enter"
  "0x54007b":
    command: 'key "reset"'
    repeat: false
    description: "Reset"

  # --- Picture Presets (verified) ---
  "0x1a2a53":
    command: 'picture_mode "cinema_film1"'
    repeat: false
    description: "Cinema Film 1"
  "0x1a2a58":
    command: 'picture_mode "cinema_film2"'
    repeat: false
    description: "Cinema Film 2"
  "0x1a2a55":
    command: 'picture_mode "reference"'
    repeat: false
    description: "Reference"
  "0x1a2a52":
    command: 'picture_mode "tv"'
    repeat: false
    description: "TV"
  "0x1a2a57":
    command: 'picture_mode "photo"'
    repeat: false
    description: "Photo"
  "0x1a2a56":
    command: 'picture_mode "game"'
    repeat: false
    description: "Game"
  "0x1a2a59":
    command: 'picture_mode "brt_cinema"'
    repeat: false
    description: "Bright Cinema"
  "0x1a2a51":
    command: 'picture_mode "brt_tv"'
    repeat: false
    description: "Bright TV"
  "0x1a2a54":
    command: 'picture_mode "user"'
    repeat: false
    description: "User"

  # --- Picture Adjustments (query-then-set: brightness ±1 step) ---
  "0x54001e":
    command: "brightness_up"
    repeat: true
    description: "Brightness Up"
  "0x54001f":
    command: "brightness_down"
    repeat: true
    description: "Brightness Down"
  "0x540018":
    command: "contrast_up"
    repeat: true
    description: "Contrast Up"
  "0x540019":
    command: "contrast_down"
    repeat: true
    description: "Contrast Down"
  "0x540022":
    command: "sharpness_up"
    repeat: true
    description: "Sharpness Up"
  "0x540023":
    command: "sharpness_down"
    repeat: true
    description: "Sharpness Down"

  # --- Advanced Settings (verified) ---
  "0x1a2a4c":
    command: "real_cre_toggle"
    repeat: false
    description: "Reality Creation On/Off"
  "0x540005":
    command: "motionflow_toggle"
    repeat: false
    description: "Motion Enhancer"
  "0x1a2a6e":
    command: 'key "aspect"'
    repeat: false
    description: "Aspect Ratio"
  "0x1a2a5c":
    command: 'key "color_temp"'
    repeat: false
    description: "Color Temperature"

  # --- Unmapped (no confirmed ADCP command) ---
  # "0x1a2a78": Test Pattern — no valid key name found
  # "0x1a2a3b": 3D — no valid key name found
  # "0x1a2a4b": Color Space — color_space is a setting command, not a key
  # "0x1a2a08": RCP — no valid key name found
  # "0x1a2a5e": Gamma — gamma is not a valid command name
