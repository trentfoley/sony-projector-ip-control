# Sony VPL-XW5000ES IR-to-ADCP Bridge Configuration
# Scancodes discovered from Sony RM-PJ28 remote via --discover mode

projector:
  host: "192.168.1.80"
  port: 53595
  password: ""
  timeout_connect: 5.0
  timeout_read: 3.0
  retries: 3
  retry_delay: 0.2

ir:
  device_name: "gpio_ir_recv"
  protocol: "sony"

mappings:
  # --- Power ---
  "0x540015":
    command: power_toggle
    repeat: false
    description: "Power On/Off"

  # --- Input ---
  "0x540057":
    command: 'input "hdmi1"'
    repeat: false
    description: "Input (cycles HDMI — may need toggle logic later)"

  # --- Menu Navigation ---
  "0x540029":
    command: 'key "menu"'
    repeat: false
    description: "Menu"
  "0x540035":
    command: 'key "up"'
    repeat: true
    description: "Up"
  "0x540036":
    command: 'key "down"'
    repeat: true
    description: "Down"
  "0x540034":
    command: 'key "left"'
    repeat: true
    description: "Left"
  "0x540033":
    command: 'key "right"'
    repeat: true
    description: "Right"
  "0x54005a":
    command: 'key "enter"'
    repeat: false
    description: "Enter"
  "0x54007b":
    command: 'key "reset"'
    repeat: false
    description: "Reset"

  # --- Picture Presets ---
  # These use calibration_preset — exact values need verification against projector
  "0x1a2a53":
    command: 'calibration_preset "cinema_film_1"'
    repeat: false
    description: "Cinema Film 1"
  "0x1a2a58":
    command: 'calibration_preset "cinema_film_2"'
    repeat: false
    description: "Cinema Film 2"
  "0x1a2a55":
    command: 'calibration_preset "reference"'
    repeat: false
    description: "Reference"
  "0x1a2a52":
    command: 'calibration_preset "tv"'
    repeat: false
    description: "TV"
  "0x1a2a57":
    command: 'calibration_preset "photo"'
    repeat: false
    description: "Photo"
  "0x1a2a56":
    command: 'calibration_preset "game"'
    repeat: false
    description: "Game"
  "0x1a2a59":
    command: 'calibration_preset "bright_cinema"'
    repeat: false
    description: "Bright Cinema"
  "0x1a2a51":
    command: 'calibration_preset "bright_tv"'
    repeat: false
    description: "Bright TV"
  "0x1a2a54":
    command: 'calibration_preset "user"'
    repeat: false
    description: "User"

  # --- Picture Adjustments ---
  # ADCP uses absolute values — these may need query-then-increment logic
  "0x54001e":
    command: 'brightness "up"'
    repeat: true
    description: "Brightness Up"
  "0x54001f":
    command: 'brightness "down"'
    repeat: true
    description: "Brightness Down"
  "0x540018":
    command: 'contrast "up"'
    repeat: true
    description: "Contrast Up"
  "0x540019":
    command: 'contrast "down"'
    repeat: true
    description: "Contrast Down"
  "0x540022":
    command: 'sharpness "up"'
    repeat: true
    description: "Sharpness Up"
  "0x540023":
    command: 'sharpness "down"'
    repeat: true
    description: "Sharpness Down"

  # --- Advanced Settings ---
  # These ADCP command names are unconfirmed — test against projector
  "0x1a2a4c":
    command: 'real_cre "on"'
    repeat: false
    description: "Reality Creation"
  "0x540005":
    command: 'motion_enhancer "on"'
    repeat: false
    description: "Motion Enhancer"
  "0x540007":
    command: 'contrast_enhancer "on"'
    repeat: false
    description: "Contrast Enhancer"
  "0x1a2a78":
    command: 'key "pattern"'
    repeat: false
    description: "Test Pattern"
  "0x1a2a6e":
    command: 'key "aspect"'
    repeat: false
    description: "Aspect Ratio"
  "0x1a2a3b":
    command: 'key "3d"'
    repeat: false
    description: "3D"
  "0x1a2a4b":
    command: 'key "color_space"'
    repeat: false
    description: "Color Space"
  "0x1a2a5c":
    command: 'key "color_temp"'
    repeat: false
    description: "Color Temperature"
  "0x1a2a08":
    command: 'key "rcp"'
    repeat: false
    description: "RCP"
  "0x1a2a5e":
    command: 'key "gamma"'
    repeat: false
    description: "Gamma"
